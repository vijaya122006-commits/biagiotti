<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Cosmetic Market Intelligence System</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary:       #B76E79;
            --primary-hover: #A15D67;
            --primary-light: #FCE4EC;
            --bg-body:       #FFFAFB;
            --text-dark:     #2C2A2A;
            --text-muted:    #7E7C7C;
            --border:        #F0E1E4;
            --safe:          #27AE60;
            --danger:        #D35400;
            --font-head:     'Playfair Display', serif;
            --font-body:     'Poppins', sans-serif;
            --radius-sm:     10px;
            --radius-md:     18px;
            --radius-lg:     28px;
            --shadow-lg:     0 20px 60px rgba(183,110,121,0.18);
        }
        body {
            font-family: var(--font-body);
            color: var(--text-dark);
            background: linear-gradient(135deg, #fdf6ff 0%, #fff1f2 40%, #fef9f0 70%, #f0fff4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(24px);
            border-radius: var(--radius-lg);
            padding: 2.75rem 2.5rem;
            width: 100%; max-width: 420px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255,255,255,0.8);
        }
        .logo-wrap { text-align: center; margin-bottom: 2rem; }
        .logo-mark {
            width: 58px; height: 58px; border-radius: 16px;
            background: var(--primary);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.6rem; color: white; margin-bottom: .7rem;
            box-shadow: 0 6px 20px rgba(183,110,121,.35);
        }
        .form-group { margin-bottom: 1.1rem; }
        .form-label { display: block; font-size: .85rem; font-weight: 500; margin-bottom: .4rem; color: var(--text-dark); }
        .input-wrap { position: relative; }
        .form-input {
            width: 100%;
            padding: .78rem 1rem .78rem 2.6rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: var(--font-body); font-size: .9rem;
            background: var(--bg-body); color: var(--text-dark);
            transition: all .2s; outline: none;
        }
        .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .submit-btn {
            width: 100%; padding: .9rem; border: none; border-radius: var(--radius-sm);
            background: var(--primary); color: white;
            font-family: var(--font-body); font-weight: 600; font-size: .95rem;
            cursor: pointer; transition: all .25s;
            box-shadow: 0 4px 14px rgba(183,110,121,.3);
            display: flex; align-items: center; justify-content: center; gap: .5rem;
        }
        .submit-btn:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-2px); }
        .msg-box { display: none; border-radius: 8px; padding: .65rem 1rem; margin-bottom: 1rem; font-size: .83rem; align-items: center; gap: .5rem; }
        .msg-box.error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; display: flex; }
        .msg-box.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; display: flex; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-wrap">
            <div class="logo-mark"><i class="fa-solid fa-key"></i></div>
            <h1 style="font-family:var(--font-head); font-size:1.5rem;">New Password</h1>
            <p style="font-size:.83rem; color:var(--text-muted);">Create a secure password for your account.</p>
        </div>

        <div id="msg" class="msg-box"></div>

        <form id="resetForm" onsubmit="handleReset(event)">
            <div class="form-group">
                <label class="form-label">New Password</label>
                <div class="input-wrap">
                    <i class="input-icon fa-solid fa-lock"></i>
                    <input id="password" class="form-input" type="password" placeholder="••••••••" required minlength="6">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="input-wrap">
                    <i class="input-icon fa-solid fa-lock"></i>
                    <input id="confirmPassword" class="form-input" type="password" placeholder="••••••••" required minlength="6">
                </div>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Reset Password</button>
        </form>

        <div style="text-align:center; margin-top:1.5rem;">
            <a href="index.html" style="font-size:.85rem; color:var(--primary); text-decoration:none;">Back to Login</a>
        </div>
    </div>

    <script>
        var API_BASE = 'https://biagiotti-intelligence-jto5.onrender.com';
        var urlParams = new URLSearchParams(window.location.search);
        var token = urlParams.get('token');

        if (!token) {
            var msg = document.getElementById('msg');
            msg.textContent = 'Invalid or missing reset token.';
            msg.className = 'msg-box error';
            document.getElementById('resetForm').style.display = 'none';
        }

        function handleReset(e) {
            e.preventDefault();
            var pwd = document.getElementById('password').value;
            var conf = document.getElementById('confirmPassword').value;
            var btn = document.getElementById('submitBtn');
            var msg = document.getElementById('msg');

            if (pwd !== conf) {
                msg.textContent = 'Passwords do not match.';
                msg.className = 'msg-box error';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Resetting...';

            fetch(API_BASE + '/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token, password: pwd })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    msg.textContent = data.message;
                    msg.className = 'msg-box success';
                    document.getElementById('resetForm').style.display = 'none';
                    setTimeout(() => window.location.href = 'index.html', 3000);
                } else {
                    msg.textContent = data.error || 'Failed to reset password.';
                    msg.className = 'msg-box error';
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                }
            })
            .catch(err => {
                msg.textContent = 'Server error. Please try again later.';
                msg.className = 'msg-box error';
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            });
        }
    </script>
</body>
</html>
