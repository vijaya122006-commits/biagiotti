services:
  - type: web
    name: biagiotti-intelligence
    runtime: python
    buildCommand: pip install -r backend/requirements.txt && cd backend && python create_demo_db.py
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: false
      - key: SECRET_KEY
        value: biagiotti-demo-secret-2026
      - key: PYTHON_VERSION
        value: "3.11.0"
